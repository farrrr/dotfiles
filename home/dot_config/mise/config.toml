[tools]
# --- 核心執行環境（Rust 改用 rustup 管理） ---
go = "latest"
node = "lts"
pnpm = "latest"
python = "3.13"

# --- 系統與管理 ---
chezmoi = "latest"
uv = "latest"

# --- 雲端與開發 ---
aws-cli = "latest"
dotenvx = "latest"

# --- CLI 增強工具 ---
bat = "latest"
curlie = "latest"
delta = "latest"
eza = "latest"
fd = "latest"
fzf = "latest"
jq = "latest"
lazygit = "latest"
ripgrep = "latest"
tree-sitter = "latest"
yazi = "latest"
zellij = "latest"

# --- 格式化與檢查 ---
shellcheck = "latest"
shfmt = "latest"

# --- Node 全域套件 ---
"npm:bash-language-server" = "latest"

# --- GitHub 來源工具 ---
ghq = "latest"
# gh aqua backend 有 attestation bug，暫用 asdf backend
"asdf:bartlomiejdanek/asdf-github-cli" = "latest"

# --- 以下由 Homebrew / apt 管理（mise 不支援） ---
# oh-my-posh, sheldon

[settings]
idiomatic_version_file_enable_tools = ["python"]

[env]
# 避免 GitHub API rate limit（未認證 60 次/小時，認證 5000 次/小時）
GITHUB_TOKEN = "{{exec(command='gh auth token')}}"
