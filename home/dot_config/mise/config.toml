[tools]
# --- 核心執行環境（Rust 改用 rustup 管理） ---
go = "latest"
node = "lts"
pnpm = "latest"
python = "3.13"

# --- 系統與管理 ---
chezmoi = "latest"
uv = "latest"

# --- 雲端與開發 ---
aws-cli = "latest"
dotenvx = "latest"

# --- CLI 增強工具 ---
bat = "latest"
curlie = "latest"
delta = "latest"
eza = "latest"
fd = "latest"
fzf = "latest"
jq = "latest"
lazygit = "latest"
oh-my-posh = "latest"
prettyping = "latest"
ripgrep = "latest"
sheldon = "latest"
tree-sitter = "latest"
yazi = "latest"
zellij = "latest"

# --- 格式化與檢查 ---
shellcheck = "latest"
shfmt = "latest"

# --- Node 全域套件 ---
"npm:bash-language-server" = "latest"

# --- GitHub 來源工具 ---
"github:x-motemen/ghq" = "latest"
"github:cli/cli" = "latest"

[settings]
idiomatic_version_file_enable_tools = ["python"]
