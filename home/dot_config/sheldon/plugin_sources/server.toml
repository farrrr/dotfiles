# Server 模式專用插件
# =============================================================================

[plugins.server-path]
inline = '''
function _server_path() {
    typeset -gU path fpath
    path=( $path ${HOME}/.local/bin/server(N-/) )
    fpath=( $fpath ${HOME}/.local/bin/server(N-/) )
}
zsh-defer _server_path
'''

[plugins.server-alias]
local = "~/.config/alias"
use = ["server.sh"]
