"$schema": "https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json"
version: 3
final_space: true
console_title_template: "{{ .Folder }}"

palette:
  bg: "#1a1b26"
  bg_dark: "#16161e"
  bg_highlight: "#292e42"
  fg: "#c0caf5"
  blue: "#7aa2f7"
  green: "#9ece6a"
  yellow: "#e0af68"
  red: "#f7768e"
  magenta: "#bb9af7"
  orange: "#ff9e64"
  teal: "#73daca"
  cyan: "#7dcfff"

blocks:
  # === 左側主提示 ===
  - type: prompt
    alignment: left
    segments:
      - type: session
        style: diamond
        foreground: "p:bg"
        background: "p:red"
        leading_diamond: ""
        template: " {{ .UserName }}@{{ .HostName }} "
        properties:
          ssh_icon: " "
        include_conditions:
          - type: session
            content: "ssh"

      - type: os
        style: diamond
        foreground: "p:fg"
        background: "p:bg_highlight"
        leading_diamond: ""
        template: "{{ .Icon }} "

      - type: path
        style: powerline
        foreground: "p:fg"
        background: "p:bg_highlight"
        powerline_symbol: ""
        properties:
          style: agnoster_short
          max_depth: 3

      - type: git
        style: powerline
        foreground: "p:bg"
        background: "p:green"
        powerline_symbol: ""
        template: " {{ .HEAD }}{{ if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }}  {{ .Working.String }}{{ end }}{{ if .Staging.Changed }}  {{ .Staging.String }}{{ end }} "
        properties:
          branch_icon: " "
          fetch_status: true
          fetch_upstream_icon: true
          cache_duration: 5m

      - type: go
        style: powerline
        foreground: "p:bg"
        background: "p:cyan"
        powerline_symbol: ""
        template: "  {{ .Full }} "

      - type: node
        style: powerline
        foreground: "p:bg"
        background: "p:green"
        powerline_symbol: ""
        template: "  {{ .Full }} "

      - type: python
        style: powerline
        foreground: "p:bg"
        background: "p:yellow"
        powerline_symbol: ""
        template: "  {{ .Full }} "

      - type: rust
        style: powerline
        foreground: "p:bg"
        background: "p:orange"
        powerline_symbol: ""
        template: "  {{ .Full }} "

      - type: aws
        style: powerline
        foreground: "p:bg"
        background: "p:yellow"
        powerline_symbol: ""
        template: "  {{ .Profile }}{{ if .Region }} ({{ .Region }}){{ end }} "

      - type: gcp
        style: powerline
        foreground: "p:bg"
        background: "p:blue"
        powerline_symbol: ""
        template: " 󱇶 {{ .Project }} "

  # === 右側提示（時間與執行時間） ===
  - type: rprompt
    segments:
      - type: executiontime
        style: plain
        foreground: "p:yellow"
        template: "󰔟 {{ .FormattedMs }}"
        properties:
          threshold: 2000
          style: austin

      - type: time
        style: plain
        foreground: "p:bg_highlight"
        template: " {{ .CurrentDate | date \"15:04\" }}"

  # === 第二行輸入提示 ===
  - type: prompt
    alignment: left
    newline: true
    segments:
      - type: text
        style: plain
        foreground: "p:green"
        foreground_templates:
          - "{{ if gt .Code 0 }}p:red{{ end }}"
        template: "❯"

# 歷史指令只顯示精簡提示，保持畫面乾淨
transient_prompt:
  foreground: "p:fg"
  foreground_templates:
    - "{{ if gt .Code 0 }}p:red{{ end }}"
  template: "❯ "
