name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: installer/go.mod
          cache-dependency-path: installer/go.sum

      - name: 交叉編譯所有平台
        working-directory: installer
        run: make all

      - name: 取得 tag message
        id: tag_info
        run: |
          TAG_MESSAGE=$(git tag -l --format='%(contents:subject)' ${GITHUB_REF_NAME})
          echo "message=${TAG_MESSAGE}" >> "$GITHUB_OUTPUT"

      - name: 建立 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.ref_name }} — ${{ steps.tag_info.outputs.message }}"
          files: installer/dist/*
          generate_release_notes: true
